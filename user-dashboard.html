<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard — CCL Complaint System</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/user-dashboard.css">
</head>
<body>

    <!-- ── HEADER ──────────────────────────────────────────────────────────── -->
    <header class="navbar">
        <span class="navbar-brand">Departmental Complaint Management System</span>
        <nav id="nav" class="navbar-links"></nav>
    </header>

    <div id="alertContainer"></div>

    <!-- ── PAGE HEADER ────────────────────────────────────────────────────── -->
    <div class="page-header">
        <h1>User Dashboard</h1>
        <p id="welcomeTitle" style="color:rgba(255,255,255,0.7); font-size:13px; letter-spacing:1.5px; margin-top:6px; text-transform:uppercase;"></p>
    </div>

    <!-- ── MAIN ───────────────────────────────────────────────────────────── -->
    <main class="main-content">

        <!-- TAB BAR -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab(this, 'file')">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                File Complaint
            </button>
            <button class="tab-btn" onclick="switchTab(this, 'received')">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                </svg>
                Received Complaints
            </button>
        </div>

        <!-- TAB 1: FILE COMPLAINT -->
        <div id="tab-file" class="tab-content active">
            <div class="form-card">
                <h3>Register New Complaint</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label for="c-title">Complaint Title *</label>
                        <input type="text" id="c-title" placeholder="Brief title of the issue">
                    </div>
                    <div class="form-group">
                        <label for="c-category">Category *</label>
                        <select id="c-category">
                            <option value="">— Select Category —</option>
                            <option>Electrical</option>
                            <option>Mechanical</option>
                            <option>IT</option>
                            <option>HR</option>
                            <option>Infrastructure</option>
                            <option>Payroll</option>
                            <option>Safety</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="c-dept">Target Department *</label>
                        <select id="c-dept" onchange="loadDeptUsers()">
                            <option value="">— Select Department —</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="c-person">Concerned Person *</label>
                        <select id="c-person">
                            <option value="">— Select Department first —</option>
                        </select>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label for="c-desc">Description *</label>
                        <textarea id="c-desc" placeholder="Describe the issue in detail…"></textarea>
                    </div>
                </div>

                <button class="btn-primary" onclick="submitComplaint()">Submit Complaint</button>
            </div>
        </div>

        <!-- TAB 2: RECEIVED COMPLAINTS -->
        <div id="tab-received" class="tab-content">
            <div id="receivedContent">
                <p style="color:var(--text-muted); padding:20px 0;">Loading…</p>
            </div>
        </div>

    </main>

    <footer style="text-align:center; padding:24px; font-size:12px; color:var(--text-muted); border-top:1px solid var(--border); margin-top:40px;">
        Developed by Sristi &amp; Smrity
    </footer>

    <script src="/common.js"></script>
    <script src="/user-dashboard.js"></script>
</body>
</html>
