<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CCL Complaint System</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Departmental Complaint Management System</h1>
        <nav id="nav"></nav>
    </header>

    <div id="alertContainer"></div>

    <main class="container">
        <h2>Login to Complaint System</h2>

        <form id="loginForm">
            <label>Employee Code:</label><br>
            <input type="text" name="emp_code" placeholder="e.g. CCL001" required><br><br>

            <label>Password:</label><br>
            <input type="password" name="password" required><br><br>

            <button type="submit">Login</button>
        </form>

        <br>
        <a href="/">Back to Home</a>
    </main>

    <footer>Developed by Sristi & Smrity</footer>
    <script src="/common.js"></script>
    <script src="/login.js"></script>
</body>
</html>
